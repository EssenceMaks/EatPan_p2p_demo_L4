<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>EatPan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --surface2: #1e1e2e;
      --border: #2a2a3e;
      --accent: #7c6aff;
      --accent-glow: rgba(124, 106, 255, 0.3);
      --green: #4ade80;
      --red: #f87171;
      --text: #e2e2f0;
      --text-dim: #888899;
      --orange: #fb923c;
      --yellow: #fbbf24;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ─── TITLE BAR ─── */
    .titlebar {
      -webkit-app-region: drag;
      background: linear-gradient(135deg, #12121a, #1a1a2e);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      height: 42px;
    }

    .titlebar h1 {
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--orange));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .titlebar .version {
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .my-name {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      padding: 3px 8px;
      background: rgba(124, 106, 255, 0.1);
      border-radius: 10px;
      border: 1px solid rgba(124, 106, 255, 0.2);
      margin-left: auto;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }

    .status-dot.online {
      background: var(--green);
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
    }

    /* ─── UPDATE BANNER ─── */
    .update-banner {
      display: none;
      background: linear-gradient(135deg, rgba(124,106,255,0.15), rgba(251,147,60,0.15));
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      flex-shrink: 0;
    }

    .update-banner.show { display: flex; }

    .update-banner .update-text { flex: 1; }

    .update-banner button {
      -webkit-app-region: no-drag;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .update-banner button:hover { background: #6b5ce7; }

    .update-progress {
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      flex: 1;
    }

    .update-progress-bar {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s;
      width: 0%;
    }

    /* ─── MAIN LAYOUT ─── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 200px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      padding: 14px 14px 6px;
    }

    .peer-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 6px;
    }

    .peer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 1px;
      transition: background 0.15s;
    }

    .peer-item:hover { background: var(--surface2); }

    .peer-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .peer-info .peer-name { font-size: 12px; font-weight: 500; }
    .peer-info .peer-id { font-size: 9px; color: var(--text-dim); font-family: monospace; }

    .peer-online-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      margin-left: auto;
      flex-shrink: 0;
      box-shadow: 0 0 4px rgba(74, 222, 128, 0.3);
    }

    .sidebar-footer {
      padding: 10px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
    }

    /* ─── CHAT ─── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message {
      max-width: 60%;
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.4;
      animation: fadeIn 0.2s ease;
      user-select: text;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.mine {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message .msg-header {
      display: flex;
      gap: 6px;
      align-items: baseline;
      margin-bottom: 3px;
    }

    .message .msg-name { font-size: 11px; font-weight: 600; color: var(--orange); }
    .message.mine .msg-name { color: rgba(255,255,255,0.6); }
    .message .msg-time { font-size: 9px; color: var(--text-dim); }
    .message.mine .msg-time { color: rgba(255,255,255,0.4); }

    .message.system {
      align-self: center;
      max-width: 80%;
      background: none;
      color: var(--text-dim);
      font-size: 11px;
      text-align: center;
      padding: 4px;
    }

    /* ─── INPUT ─── */
    .input-area {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .input-row button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .input-row button:hover { background: #6b5ce7; transform: scale(1.02); }
    .input-row button:active { transform: scale(0.98); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Title Bar -->
  <div class="titlebar">
    <h1>🍳 EatPan</h1>
    <span class="version">v0.2.0</span>
    <span class="my-name" id="myName">...</span>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Запуск...</span>
    </div>
  </div>

  <!-- Update Banner -->
  <div class="update-banner" id="updateBanner">
    <span>🔔</span>
    <span class="update-text" id="updateText"></span>
    <div class="update-progress" id="updateProgress" style="display:none">
      <div class="update-progress-bar" id="updateProgressBar"></div>
    </div>
    <button id="updateBtn">Оновити</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="sidebar">
      <h2>Online</h2>
      <div class="peer-list" id="peerList"></div>
      <div class="sidebar-footer" id="connectionInfo">P2P • libp2p</div>
    </div>

    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="message system">Підключення до P2P мережі...</div>
      </div>

      <div class="input-area">
        <div class="input-row">
          <input type="text" id="msgInput" placeholder="Напиши повідомлення..." autocomplete="off">
          <button id="sendBtn">Надіслати</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════ STATE ═══════════════
    let myName = ''
    let myPeerId = ''
    const colors = ['#7c6aff','#fb923c','#4ade80','#f87171','#38bdf8','#e879f9','#fbbf24','#34d399']

    function peerColor(name) {
      let h = 0
      for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h)
      return colors[Math.abs(h) % colors.length]
    }

    // ═══════════════ UI ═══════════════
    const $ = (id) => document.getElementById(id)
    const $messages = $('messages')
    const $input = $('msgInput')
    const $sendBtn = $('sendBtn')
    const $peerList = $('peerList')

    function addMessage(data) {
      const div = document.createElement('div')
      const isMine = data.peerId === myPeerId
      div.className = `message ${isMine ? 'mine' : 'other'}`
      const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      div.innerHTML = `
        <div class="msg-header">
          <span class="msg-name">${esc(data.from)}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div>${esc(data.text)}</div>
      `
      $messages.appendChild(div)
      $messages.scrollTop = $messages.scrollHeight
    }

    function addSystem(text) {
      const div = document.createElement('div')
      div.className = 'message system'
      div.textContent = text
      $messages.appendChild(div)
      $messages.scrollTop = $messages.scrollHeight
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

    function updatePeers(peers) {
      $peerList.innerHTML = ''
      let count = 0
      for (const [id, info] of Object.entries(peers)) {
        count++
        const div = document.createElement('div')
        div.className = 'peer-item'
        const c = peerColor(info.name)
        const isMe = id === myPeerId
        div.innerHTML = `
          <div class="peer-avatar" style="background:${c}">${info.name[0].toUpperCase()}</div>
          <div class="peer-info">
            <div class="peer-name">${esc(info.name)}${isMe ? ' (ти)' : ''}</div>
            <div class="peer-id">${id.substring(0,12)}...</div>
          </div>
          <div class="peer-online-dot"></div>
        `
        $peerList.appendChild(div)
      }
      $('connectionInfo').textContent = `P2P • ${count} онлайн`
    }

    // ═══════════════ SEND ═══════════════
    function send() {
      const text = $input.value.trim()
      if (!text) return
      window.eatpan.sendMessage(text)
      $input.value = ''
      $input.focus()
    }

    $sendBtn.addEventListener('click', send)
    $input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send() })

    // ═══════════════ IPC LISTENERS ═══════════════

    // Статус ноди
    window.eatpan.getStatus().then((status) => {
      if (!status) return
      myName = status.name
      myPeerId = status.peerId
      $('myName').textContent = myName
      $('statusDot').classList.add('online')
      $('statusText').textContent = 'Online'
      $messages.innerHTML = ''
      addSystem(`👋 Ти — ${myName}. Шукаю інших пірів...`)
      updatePeers(status.peers)
    })

    // Повідомлення
    window.eatpan.onChatMessage((msg) => addMessage(msg))

    // Оновлення списку пірів
    window.eatpan.onPeersUpdate((peers) => updatePeers(peers))

    // Новий пір
    window.eatpan.onPeerConnected((id) => {
      addSystem(`✅ Новий пір підключився`)
    })

    window.eatpan.onPeerDisconnected((id) => {
      addSystem(`❌ Пір від'єднався`)
    })

    // ═══════════════ AUTO-UPDATE ═══════════════
    const $updateBanner = $('updateBanner')
    const $updateText = $('updateText')
    const $updateBtn = $('updateBtn')
    const $updateProgress = $('updateProgress')
    const $updateProgressBar = $('updateProgressBar')

    window.eatpan.onUpdateAvailable((info) => {
      $updateBanner.classList.add('show')
      $updateText.textContent = `Доступна версія ${info.version}`
      $updateBtn.textContent = 'Завантажити'
      $updateBtn.onclick = () => {
        window.eatpan.downloadUpdate()
        $updateBtn.disabled = true
        $updateBtn.textContent = '...'
        $updateProgress.style.display = 'block'
      }
    })

    window.eatpan.onUpdateProgress((p) => {
      $updateProgressBar.style.width = p.percent + '%'
      $updateText.textContent = `Завантаження: ${p.percent}%`
    })

    window.eatpan.onUpdateDownloaded(() => {
      $updateText.textContent = 'Оновлення готове!'
      $updateProgress.style.display = 'none'
      $updateBtn.disabled = false
      $updateBtn.textContent = 'Перезапустити'
      $updateBtn.onclick = () => window.eatpan.installUpdate()
    })
  </script>
</body>
</html>
